<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Chat with Gemini AI - A simple chatbot interface" />
  <title>NagaFit Coach</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header>
      <div class="profile-header">
        <div class="profile-avatar">
          <div class="avatar-circle">
            <img src="profilepictbot.jpg" alt="Coach Naga" class="avatar-img" />
            <!-- <span class="avatar-initials">NC</span> -->
          </div>
        </div>
        <div class="profile-info">
          <h1>Coach Naga</h1>
          <p class="profile-status" id="status-indicator">Online • Personal Trainer & Fitness Coach</p>
          <div class="mood-indicator" id="mood-indicator">
            <span class="mood-emoji">😐</span>
            <span class="mood-label">Neutral</span>
          </div>
        </div>
      </div>
    </header>
    <main>
      <div id="chat-box" class="chat-box" role="log" aria-live="polite" aria-label="Chat messages"></div>
      <form id="chat-form" aria-label="Send a message">
        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" required aria-label="Your message" />
        <button type="submit" aria-label="Send message">Send</button>
      </form>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
